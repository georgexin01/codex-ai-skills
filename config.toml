# GitNexus — MCP knowledge-graph engine: gives the agent structural codebase
# awareness (dependencies, call chains, blast radius) in one query.
# Uses the global install (npm i -g gitnexus). Run `gitnexus analyze` inside a
# git repo first so the server has a graph to serve.
[mcp_servers.gitnexus]
command = "C:\\Users\\user\\AppData\\Roaming\\npm\\gitnexus.cmd"
args = ["mcp"]

